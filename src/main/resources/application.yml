spring:
  application:
    name: loyalty-service
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:3306/loyalty_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

server:
  port: 8082

userservice:
  url: ${USER_SERVICE_URL:http://localhost:8081}
